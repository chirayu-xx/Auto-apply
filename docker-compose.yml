services:
  postgres:
    image: postgres:16-alpine
    container_name: auto-apply-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoapply}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoapply123}
      POSTGRES_DB: ${POSTGRES_DB:-autoapply}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto-apply-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: auto-apply-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
